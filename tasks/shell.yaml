---
- name: Install zsh
  ansible.builtin.apt:
    name: zsh
    state: present

- name: Change login shell for user
  ansible.builtin.user:
    name: rune
    shell: /usr/bin/zsh

- name: Set ZDOTDIR globally
  ansible.builtin.lineinfile:
    path: /etc/zsh/zshenv
    line: export $ZDOTDIR="$HOME/.config/zsh"
    state: present
  become: true

- name: Get oh-my-zsh install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
    dest: /tmp/ohmyzsh.sh
    mode: u=rx

- name: Execute oh-my-zsh install script
  ansible.builtin.shell:
    chdir: /tmp
    cmd: ZSH=$HOME/.config/zsh/ohmyzsh sh /tmp/ohmyzsh.sh

- name: Glone zsh plugins
  ansible.builtin.git:
    repo: "{{ item }}"
    dest: ZSH/custom/plugins
  with_items:
    - https://github.com/zsh-users/zsh-autosuggestions
    - https://github.com/zsh-users/zsh-syntax-highlighting

- name: Install rofi packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  with_items:
    - rofi
    - ddgr
    - libjson-glib-dev
    - libcairo2-dev
    - rofi-dev
  become: true

